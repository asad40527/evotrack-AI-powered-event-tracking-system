<div
  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/5 transition-colors duration-300"
>
  <div class="px-6 py-5">
    <h3 class="text-base font-semibold text-gray-800 dark:text-white/90">
      Sentiment Analysis
    </h3>
    <p class="mt-1 text-gray-500 text-sm dark:text-gray-400">
      Last updated: <span class="refresh-time">Loading...</span>
    </p>
  </div>

  <div class="border-t border-gray-100 px-6 py-6.5 dark:border-gray-700">
    <!-- Chart container -->
    <div class="max-w-full">
      <div id="sentimentChart" class="min-h-[350px]"></div>
    </div>

    <!-- Sentiment analysis form -->
    <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700">
      <form id="sentiment-form" class="space-y-4" novalidate>
        <div>
          <label
            for="text-input"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
          >
            Analyze new text
          </label>
          <textarea
            id="text-input"
            rows="3"
            class="block w-full rounded-lg border border-gray-200 bg-white px-4 py-2 text-gray-900 shadow-sm placeholder-gray-400 focus:border-blue-600 focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 sm:text-sm transition-colors duration-300"
            placeholder="Enter text to analyze sentiment..."
            required
            aria-describedby="text-input-desc"
          ></textarea>
          <p id="text-input-desc" class="sr-only">Enter the text you want analyzed for sentiment</p>
        </div>
        <div class="flex items-center justify-between">
          <button
            type="submit"
            class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-all hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 disabled:opacity-70 disabled:cursor-not-allowed"
          >
            Analyze Sentiment
          </button>
          <span class="text-xs text-gray-500 dark:text-gray-400 select-none">
            Powered by AI
          </span>
        </div>
      </form>

      <!-- Results container -->
      <div id="sentiment-result" class="mt-4"></div>
    </div>
  </div>
</div>
